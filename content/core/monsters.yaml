monsters:
  - id: rat
    name: Sewer Rat
    hp: 10
    attack: 2
    defense: 0
    xpReward: 15
    blurb: Small, fast, and unreasonably angry.
    lootTable:
      - itemId: rusty-sword
        dropChance: 0.1
      - itemId: leather-vest
        dropChance: 0.1
      - itemId: scrap-metal
        dropChance: 0.3
  - id: bandit
    name: Highway Bandit
    hp: 20
    attack: 4
    defense: 1
    xpReward: 35
    blurb: Wants your coin purse more than your life, but will settle for either.
    lootTable:
      - itemId: bandit-dagger
        dropChance: 0.3
      - itemId: scrap-metal
        dropChance: 0.3
  - id: direwolf
    name: Direwolf
    hp: 35
    attack: 6
    defense: 2
    xpReward: 60
    blurb: Bigger than it has any right to be.
    lootTable:
      - itemId: wolf-pelt-cloak
        dropChance: 0.25
      - itemId: wolf-fang
        dropChance: 0.4
  - id: millbrook-thing
    name: The Millbrook Thing
    hp: 60
    attack: 8
    defense: 3
    xpReward: 100
    blurb: Nobody's agreed on a better name for it yet. Nobody's stayed long enough to argue.
    lootTable:
      - itemId: wolf-fang
        dropChance: 0.5
