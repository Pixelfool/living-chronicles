services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-living_chronicles}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-living_chronicles}
      POSTGRES_DB: ${POSTGRES_DB:-living_chronicles}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-living_chronicles}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      # Secure cookies require NODE_ENV=production, which in turn requires a
      # TLS-terminating reverse proxy in front of this container (not part
      # of the v1 stack yet - see build-plan-v1.md §4, "Gated CI/CD..."/no
      # Nginx layer). Until that exists, "production" here would silently
      # break session auth (no Set-Cookie over plain HTTP). Flip this once
      # TLS is actually in front of the app.
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-living_chronicles}:${POSTGRES_PASSWORD:-living_chronicles}@postgres:5432/${POSTGRES_DB:-living_chronicles}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
    ports:
      - '8100:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
