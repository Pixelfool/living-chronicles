name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: living_chronicles
          POSTGRES_PASSWORD: living_chronicles
          POSTGRES_DB: living_chronicles
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U living_chronicles"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://living_chronicles:living_chronicles@localhost:5432/living_chronicles
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx prisma migrate deploy
      - run: npm test
      - run: npm run test:e2e
